<!DOCTYPE html>
<html>

<head>
    <title>ToDo Form</title>
</head>

<body>

    <h1>ToDo Form</h1>

    <form action="/submittodoitem" method="POST">

        <input type="text"
               name="itemName"
               placeholder="Item Name">

        <br><br>

        <input type="text"
               name="itemDescription"
               placeholder="Item Description">

        <br><br>

        <button type="submit">
            Submit
        </button>

    </form>

</body>
</html>
